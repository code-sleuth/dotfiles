# Plex + Tautulli, adapted for Docker Desktop on macOS.
# Bridge networking with an explicit port instead of host mode (host mode is
# unreliable under Docker Desktop). DLNA/autodiscovery ports are skipped —
# clients connect via plex.tv or the Mac's IP. No /dev/dri on macOS, so
# transcoding is CPU-only; prefer direct play.

services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=docker
      # PLEX_CLAIM token is only needed on first run and expires after 4 minutes.
      # Get one at https://plex.tv/claim. Leave blank on subsequent runs.
      - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      - ${CONFIG_ROOT}/plex:/config
      - ${DATA_ROOT}:/data
    ports:
      - 32400:32400
    restart: unless-stopped

  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/tautulli:/config
    ports:
      - 8181:8181
    restart: unless-stopped
