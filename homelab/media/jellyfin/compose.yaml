# Jellyfin + Jellystat, adapted for Docker Desktop on macOS.
# No /dev/dri on macOS, so transcoding is CPU-only; prefer direct play.
# DLNA port 1900/udp is dropped to avoid clashing with other services.

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      # Address advertised to client apps on the LAN (autodiscovery via 7359/udp)
      - JELLYFIN_PublishedServerUrl=http://${LAN_IP}:8096
    volumes:
      - ${CONFIG_ROOT}/config:/config
      - ${DATA_ROOT}:/data
    ports:
      - 8096:8096
      - 7359:7359/udp # Service Discovery
    restart: unless-stopped

  jellystat-db:
    image: postgres:18.1
    container_name: jellystat-db
    restart: unless-stopped
    shm_size: '1gb'
    environment:
      POSTGRES_USER: ${JELLYSTAT_POSTGRES_USER}
      POSTGRES_PASSWORD: ${JELLYSTAT_POSTGRES_PASSWORD}
    volumes:
      # postgres:18+ expects the mount at /var/lib/postgresql (not .../data)
      - ${CONFIG_ROOT}/jellystat/postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --dbname=postgres --username=${JELLYSTAT_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  jellystat:
    image: cyfershepard/jellystat:latest
    container_name: jellystat
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${JELLYSTAT_POSTGRES_USER}
      POSTGRES_PASSWORD: ${JELLYSTAT_POSTGRES_PASSWORD}
      POSTGRES_IP: jellystat-db
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JELLYSTAT_JWT_SECRET}
      TZ: ${TZ}
    volumes:
      - ${CONFIG_ROOT}/jellystat/backup-data:/app/backend/backup-data
    ports:
      - "3000:3000"
    depends_on:
      jellystat-db:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3000/auth/isConfigured || exit 1
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 30s

# Want more!? https://github.com/awesome-jellyfin/awesome-jellyfin
